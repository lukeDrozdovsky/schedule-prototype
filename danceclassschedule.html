<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danceschoolapp - Grafik Zajęć</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS STYLES (Zasady Stylizacji) --- */
        :root {
            /* Paleta kolorów z obrazka */
            --bg-body: #F8F9FA;
            --bg-sidebar: rgba(255, 255, 255, 0.8);
            --bg-card: rgba(255, 255, 255, 0.6);
            --text-main: #333;
            --text-muted: #777;
            --accent-purple: #a855f7;
            --accent-coral: #ff6b6b;
            --accent-teal: #4fd1c5;
            --accent-orange: #f6ad55;
            --border-color: rgba(0, 0, 0, 0.05);
            
            /* Gradienty Mesh na tło */
            --mesh-gradient: 
                radial-gradient(at 10% 10%, rgba(168, 85, 247, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 10%, rgba(255, 107, 107, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(79, 209, 197, 0.15) 0px, transparent 50%),
                radial-gradient(at 10% 90%, rgba(246, 173, 85, 0.15) 0px, transparent 50%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            background-image: var(--mesh-gradient);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        /* --- Układ Główny --- */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        /* --- Panel Boczny (Nawigacja) --- */
        .sidebar {
            width: 100px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
            border-right: 1px solid var(--border-color);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            margin-bottom: 30px;
            width: 100%;
            padding: 10px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-item.active {
            color: var(--accent-purple);
            position: relative;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--accent-purple);
            border-radius: 0 4px 4px 0;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        /* --- Główna Treść --- */
        .main-content {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Nagłówek i Profil */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--text-main);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ddd; /* Placeholder dla zdjęcia */
        }

        /* --- Panel Filtrów (Nowy Element) --- */
        .filter-panel {
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            padding: 15px 25px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }

        .filter-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .filter-select {
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: white;
            font-size: 14px;
            cursor: pointer;
            appearance: none; /* Ukrywa standardową strzałkę */
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007CB2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E');
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }

        /* Dynamiczny Przycisk Filtrowania */
        .filter-btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            align-self: flex-end; /* Wyrównanie do dołu filtra */
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-coral));
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(168, 85, 247, 0.3);
        }

        /* --- Grafik (Schedule Grid) --- */
        .schedule-container {
            flex: 1;
            overflow-y: auto; /* Przewijanie pionowe grafiku */
            padding-right: 10px; /* Miejsce na scrollbar */
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr); /* 7 dni tygodnia */
            gap: 15px;
        }

        /* Kolumny Dni */
        .day-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .day-header {
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-muted);
            padding-bottom: 10px;
            border-bottom: 2px solid transparent;
        }

        .day-header.active {
            color: var(--accent-purple);
            border-bottom-color: var(--accent-purple);
        }

        /* Karty Zajęć (Bento Grid Style) */
        .class-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .class-card:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            background: rgba(255, 255, 255, 0.8);
        }

        /* Kolory akcentowe dla kart */
        .class-card.salsa { border-left: 4px solid var(--accent-purple); }
        .class-card.bachata { border-left: 4px solid var(--accent-orange); }
        .class-card.high-heels { border-left: 4px solid var(--accent-coral); }
        .class-card.hip-hop { border-left: 4px solid var(--accent-teal); }

        .class-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .class-time { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }
        .class-instructor { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
        .class-level {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 20px;
            display: inline-block;
        }

        /* Poziomy Trudności - Kolory */
        .level-1 { background: rgba(79, 209, 197, 0.1); color: var(--accent-teal); }
        .level-2 { background: rgba(246, 173, 85, 0.1); color: var(--accent-orange); }
        .level-3 { background: rgba(255, 107, 107, 0.1); color: var(--accent-coral); }

        /* Ikona szczegółów (strzałka) */
        .details-icon {
            position: absolute;
            right: 15px;
            bottom: 15px;
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .class-card:hover .details-icon { opacity: 1; }

        /* Stylizacja scrollbara */
        .schedule-container::-webkit-scrollbar { width: 6px; }
        .schedule-container::-webkit-scrollbar-track { background: transparent; }
        .schedule-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="nav-item"><span class="nav-icon">⌂</span>Pulpit</div>
        <div class="nav-item active"><span class="nav-icon">📅</span>Grafik</div>
        <div class="nav-item"><span class="nav-icon">📖</span>Moje Kursy</div>
        <div class="nav-item"><span class="nav-icon">🕒</span>Lekcje</div>
        <div class="nav-item"><span class="nav-icon">💳</span>Płatności</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 class="page-title">GRAFIK ZAJĘĆ - PEŁNY WIDOK</h1>
            <div class="user-profile">
                <span>🔔</span>
                <span>Anna Kowalska</span>
                <div class="user-avatar"></div>
            </div>
        </div>

        <div class="filter-panel">
            <div class="filter-item">
                <label class="filter-label">Technika</label>
                <select class="filter-select" id="filter-technika">
                    <option value="">Wszystkie</option>
                    <option value="salsa">Salsa</option>
                    <option value="bachata">Bachata</option>
                    <option value="high-heels">High Heels</option>
                    <option value="hip-hop">Hip Hop</option>
                </select>
            </div>
            <div class="filter-item">
                <label class="filter-label">Dzień tygodnia</label>
                <select class="filter-select" id="filter-dzien">
                    <option value="">Cały tydzień</option>
                    <option value="poniedzialek">Poniedziałek</option>
                    <option value="wtorek">Wtorek</option>
                    <option value="sroda">Środa</option>
                    <option value="czwartek">Czwartek</option>
                    <option value="piatek">Piątek</option>
                </select>
            </div>
            <div class="filter-item">
                <label class="filter-label">Czas</label>
                <select class="filter-select">
                    <option value="">Dowolny</option>
                    <option value="rano">Rano (przed 12:00)</option>
                    <option value="popoludnie">Popołudnie (12:00-17:00)</option>
                    <option value="wieczor">Wieczór (po 17:00)</option>
                </select>
            </div>
            <div class="filter-item">
                <label class="filter-label">Instruktor</label>
                <select class="filter-select">
                    <option value="">Wszyscy</option>
                    <option value="maria">Maria</option>
                    <option value="alex">Alex</option>
                </select>
            </div>
            <div class="filter-item">
                <label class="filter-label">W parach</label>
                <select class="filter-select">
                    <option value="">Obojętnie</option>
                    <option value="tak">Tak</option>
                    <option value="nie">Nie</option>
                </select>
            </div>
            <button class="filter-btn" id="filter-submit-btn">
                <span id="btn-icon">🔍</span> <span id="btn-text">FILTRUJ</span>
            </button>
        </div>

        <div class="schedule-container">
            <div class="schedule-grid" id="schedule-grid">
                </div>
        </div>
    </div>
</div>

<script>
    /* --- JAVASCRIPT (Logika Działania) --- */

    // Dane testowe grafiku
    const classesData = {
        poniedzialek: [
            { name: 'Salsa', time: '18:00 - 19:00', instructor: 'Maria', level: 1, type: 'salsa' },
            { name: 'Bachata', time: '19:00 - 20:00', instructor: 'Alex', level: 2, type: 'bachata' },
            { name: 'Salsa', time: '20:00 - 21:00', instructor: 'Maria', level: 2, type: 'salsa' },
        ],
        wtorek: [
            { name: 'Bachata', time: '18:00 - 19:00', instructor: 'Alex', level: 1, type: 'bachata' },
            { name: 'High Heels', time: '19:00 - 20:00', instructor: 'Maria', level: 2, type: 'high-heels' },
            { name: 'Hip Hop', time: '20:00 - 21:00', instructor: 'Alex', level: 1, type: 'hip-hop' },
        ],
        sroda: [
            { name: 'Salsa', time: '18:00 - 19:00', instructor: 'Maria', level: 2, type: 'salsa' },
            { name: 'Bachata', time: '19:00 - 20:00', instructor: 'Alex', level: 3, type: 'bachata' },
        ],
        czwartek: [
            { name: 'High Heels', time: '18:00 - 19:00', instructor: 'Alex', level: 2, type: 'high-heels' },
            { name: 'Salsa', time: '19:00 - 20:00', instructor: 'Maria', level: 1, type: 'salsa' },
            { name: 'Hip Hop', time: '20:00 - 21:00', instructor: 'Alex', level: 2, type: 'hip-hop' },
        ],
        piatek: [
            { name: 'Salsa', time: '17:00 - 18:00', instructor: 'Maria', level: 0, type: 'salsa' },
            { name: 'Bachata', time: '18:00 - 19:00', instructor: 'Alex', level: 1, type: 'bachata' },
            { name: 'High Heels', time: '19:00 - 20:00', instructor: 'Maria', level: 1, type: 'high-heels' },
        ]
    };

    const daysOfWeek = ['Poniedziałek', 'Wtorek', 'Środa', 'Czwartek', 'Piątek', 'Sobota', 'Niedziela'];
    const gridEl = document.getElementById('schedule-grid');

    // Funkcja generująca grafik
    function renderSchedule(filterTechnika = '', filterDzien = '') {
        gridEl.innerHTML = ''; // Czyści grid

        daysOfWeek.forEach((dayName, index) => {
            const dayKey = dayName.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); // Konwersja na klucz (np. Środa -> sroda)
            
            // Filtrowanie po dniu
            if (filterDzien && filterDzien !== dayKey) return;

            const dayColumn = document.createElement('div');
            dayColumn.className = 'day-column';

            // Nagłówek dnia (wyróżnia dzisiejszy dzień - placeholder Środa)
            const dayHeader = document.createElement('div');
            dayHeader.className = `day-header ${dayKey === 'sroda' ? 'active' : ''}`;
            dayHeader.innerText = dayName;
            dayColumn.appendChild(dayHeader);

            // Generowanie kart zajęć dla danego dnia
            const dayClasses = classesData[dayKey] || [];
            let hasVisibleClasses = false;

            dayClasses.forEach(cls => {
                // Filtrowanie po technice
                if (filterTechnika && cls.type !== filterTechnika) return;

                hasVisibleClasses = true;
                const card = document.createElement('div');
                card.className = `class-card ${cls.type}`;
                card.innerHTML = `
                    <div class="class-name">${cls.name}</div>
                    <div class="class-time">${cls.time}</div>
                    <div class="class-instructor">${cls.instructor}</div>
                    <div class="class-level level-${cls.level}">Poziom ${cls.level}</div>
                    <div class="details-icon">→</div>
                `;
                dayColumn.appendChild(card);
            });

            // Dodaje kolumnę do gridu tylko jeśli ma zajęcia lub nie filtrujemy po dniu
            if (hasVisibleClasses || !filterDzien) {
                gridEl.appendChild(dayColumn);
            }
        });
    }

    // Inicjalne renderowanie
    renderSchedule();

    // Logika przycisku filtrowania
    const submitBtn = document.getElementById('filter-submit-btn');
    const technikaSelect = document.getElementById('filter-technika');
    const dzienSelect = document.getElementById('filter-dzien');
    const btnIcon = document.getElementById('btn-icon');
    const btnText = document.getElementById('btn-text');
    let isFiltered = false;

    submitBtn.addEventListener('click', () => {
        if (!isFiltered) {
            // Nakłada filtry
            const tech = technikaSelect.value;
            const dzien = dzienSelect.value;
            renderSchedule(tech, dzien);
            
            // Zmienia stan przycisku na "Wyczyść"
            btnIcon.innerText = '✕';
            btnText.innerText = 'WYCZYŚĆ FILTRY';
            submitBtn.style.background = 'linear-gradient(45deg, var(--accent-teal), #48bb78)'; // Zielony gradient
            isFiltered = true;
        } else {
            // Resetuje filtry
            technikaSelect.value = '';
            dzienSelect.value = '';
            renderSchedule();
            
            // Wraca do stanu "Filtruj"
            btnIcon.innerText = '🔍';
            btnText.innerText = 'FILTRUJ';
            submitBtn.style.background = ''; // Wraca do CSS gradientu
            isFiltered = false;
        }
    });

</script>

</body>
</html>
